server:
  port: 8080

spring:
  application:
    name: penumbra

  datasource:
    url: jdbc:postgresql://localhost:5432/penumbra
    username: penumbra
    password: penumbra
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug
    org.flywaydb: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  storage:
    endpoint: http://localhost:9000
    access-key: minio
    secret-key: minio123
    bucket: penumbra-assets