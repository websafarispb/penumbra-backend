version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: penumbra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: penumbra
      POSTGRES_USER: penumbra
      POSTGRES_PASSWORD: penumbra
    ports:
      - "5432:5432"
    volumes:
      - penumbra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U penumbra -d penumbra" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: penumbra-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - penumbra-minio-data:/data

volumes:
  penumbra-postgres-data:
  penumbra-minio-data: